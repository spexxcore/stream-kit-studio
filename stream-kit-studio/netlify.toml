[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173

[functions]
  node_bundler = "esbuild"

[functions."generate-kit"]
  timeout = 60

[[edge_functions]]
  path = "/api/generate-overlay"
  function = "generate-overlay"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
