[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173

[functions]
  node_bundler = "esbuild"

[functions."generate-overlay"]
  timeout = 60

[functions."generate-kit"]
  timeout = 60

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
